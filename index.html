<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung - Cocktail-Workshop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Cocktail-Workshop-Anmeldung</h1>
    <p class="subtitle">Cocktail-Workshop & Premium Erfahrung</p>

    <form action="formular.php" method="post">

        <fieldset>
            <legend>1. Personaldaten</legend>
            
            <div class="form-group">
                <label for="anrede">Anrede</label>
                <select id="anrede" name="anrede">
                    <option value="">-- Bitte wählen --</option>
                    <option value="Frau">Frau</option>
                    <option value="Herr">Herr</option>
                    <option value="Divers">Divers</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="vorname">Vorname *</label>
                    <input type="text" id="vorname" name="vorname" placeholder="Max" autofocus required>
                </div>
                <div class="form-group">
                    <label for="nachname">Nachname *</label>
                    <input type="text" id="nachname" name="nachname" placeholder="Mustermann" required>
                </div>
            </div>

            <div class="form-group">
                <label for="geburtsdatum">Geburtsdatum * (Mindestalter 16 Jahre)</label>
                <input type="date" id="geburtsdatum" name="geburtsdatum" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>2. Kontaktdaten</legend>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">E-Mail-Adresse *</label>
                    <input type="email" id="email" name="email" placeholder="max@mustermann.ch" required>
                </div>
                <div class="form-group">
                    <label for="telefon">Telefon (Format: +41 79 123 45 67) *</label>
                    <input type="tel" id="telefon" name="telefon" 
                           placeholder="+41 79 123 45 67" 
                           pattern="^\+?[0-9]{1,4}[ ]?[0-9]{2}[ ]?[0-9]{3}[ ]?[0-9]{2}[ ]?[0-9]{2}$"
                           title="Bitte verwenden Sie das Format: +41 79 123 45 67" required>
                </div>
            </div>

            <div class="form-group">
                <label for="strasse">Strasse und Hausnummer</label>
                <input type="text" id="strasse" name="strasse" placeholder="Musterstrasse 42">
            </div>

            <div class="form-row">
                <div class="form-group zip-field">
                    <label for="plz">PLZ *</label>
                    <input type="text" id="plz" name="plz" placeholder="1234" pattern="[0-9]{4}" title="Die Postleitzahl muss exakt aus 4 Ziffern bestehen." required>
                </div>
                <div class="form-group">
                    <label for="ort">Ort</label>
                    <input type="text" id="ort" name="ort" placeholder="Musterstadt">
                </div>
            </div>

            <div class="form-group">
                <label for="land">Land</label>
                <input type="text" id="land" name="land" value="Schweiz" >
            </div>
        </fieldset>

        <fieldset>
            <legend>3. Event- & Buchungsdetails</legend>

            <div class="form-row">
                <div class="form-group">
                    <label for="datum">Gewünschtes Datum *</label>
                    <input type="date" id="datum" name="datum" required>
                </div>
                <div class="form-group">
                    <label for="zeitfenster">Zeitfenster *</label>
                    <select id="zeitfenster" name="zeitfenster" required>
                        <option value="">-- Zeit wählen --</option>
                        <option value="16:00 - 18:30">16:00 - 18:30 Uhr</option>
                        <option value="19:00 - 21:30">19:00 - 21:30 Uhr</option>
                        <option value="22:00 - 00:30" disabled>22:00 - 00:30 Uhr (Ausgebucht)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="anzahl_personen">Anzahl Personen *</label>
                <input type="number" id="anzahl_personen" name="anzahl_personen" min="1" max="20" value="1" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>4. Paketauswahl</legend>
            <label>Wähle dein Workshop-Paket: *</label>
            
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="paket" value="Cocktail Simple" required>
                    <div>
                        <strong>Cocktail Simple</strong><br>
                        <small>Grundlagen, 3 Standard-Cocktails, inkl. Rezeptskript.</small>
                    </div>
                </label>

                <label class="radio-item">
                    <input type="radio" name="paket" value="Cocktail & Food">
                    <div>
                        <strong>Cocktail & Food</strong><br>
                        <small>3 Premium-Cocktails mit passenden Fingerfood-Snacks.</small>
                    </div>
                </label>

                <label class="radio-item">
                    <input type="radio" name="paket" value="Cocktail Premium">
                    <div>
                        <strong>Cocktail Premium</strong><br>
                        <small>5 exklusive Eigenkreationen, Raritäten-Tasting und Bar-Zertifikat.</small>
                    </div>
                </label>
            </div>
        </fieldset>

        <div class="form-group">
            <label for="bemerkungen">Bemerkungen / Allergien / Wünsche</label>
            <textarea id="bemerkungen" name="bemerkungen" rows="4" placeholder="Z. B. Allergien, vegetarische Snacks..."></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="datenschutz" name="datenschutz" required>
            <label for="datenschutz" class="label-inline">Ich habe die Datenschutzbestimmungen gelesen und stimme zu. *</label>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit">Jetzt verbindlich anmelden!</button>
            <button type="reset" class="btn-reset">Löschen</button>
        </div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
